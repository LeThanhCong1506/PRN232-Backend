name: Build, Test & Deploy to Render

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── Job 1: Build & Test ────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore PRN232-SELL-STEM.sln

      - name: Build solution
        run: dotnet build PRN232-SELL-STEM.sln --no-restore --configuration Release

      # Bỏ comment dòng dưới khi bạn có unit test project
      # - name: Run tests
      #   run: dotnet test PRN232-SELL-STEM.sln --no-build --configuration Release --verbosity normal

  # ─── Job 2: Deploy (chỉ chạy khi push lên main, không chạy với PR) ─────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | grep -qE "^(200|201|202)$" \
            && echo "Deploy triggered successfully" \
            || (echo "Deploy hook failed" && exit 1)
