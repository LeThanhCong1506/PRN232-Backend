name: Build, Test & Deploy to Railway

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── Job 1: Build & Test ────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore PRN232-SELL-STEM.sln

      - name: Build solution
        run: dotnet build PRN232-SELL-STEM.sln --no-restore --configuration Release

      # Bỏ comment dòng dưới khi bạn có unit test project
      # - name: Run tests
      #   run: dotnet test PRN232-SELL-STEM.sln --no-build --configuration Release --verbosity normal

  # ─── Job 2: Deploy (chỉ chạy khi push lên main, không chạy với PR) ─────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service 3b085e43-c37d-4dcd-814c-3c48f3df66c5 --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
